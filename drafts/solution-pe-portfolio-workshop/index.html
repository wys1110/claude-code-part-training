<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solution PE팀 Staff · 업무 포트폴리오 워크숍</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0a;--surface:#1a1a1a;--border:#2a2a2a;--text:#f0f0f0;--muted:#929292;--accent:#3b82f6;--good:#6ee7b7;--bad:#fb7185;--mono:'JetBrains Mono',monospace;--body:'Pretendard Variable',Pretendard,system-ui,sans-serif}
    html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--body)}
    .progress{position:fixed;top:0;left:0;height:3px;background:var(--accent);z-index:100;transition:width .3s ease}
    .counter{position:fixed;right:30px;bottom:20px;color:var(--muted);font:12px var(--mono);z-index:100}
    .hint{position:fixed;left:30px;bottom:18px;color:#666;font:12px var(--mono);z-index:100}
    .fullscreen-btn{position:fixed;right:24px;top:18px;z-index:100;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--muted);padding:7px 13px;cursor:pointer}
    .slide{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr;gap:44px;align-items:center;padding:64px 72px 82px;opacity:0;pointer-events:none;overflow-y:auto;transition:opacity .3s ease}
    .slide.full{grid-template-columns:1fr;justify-items:center;text-align:center}
    .slide.active{opacity:1;pointer-events:auto;z-index:2}
    .slide.active .a{opacity:0;animation:fadeInUp .4s ease forwards}.a:nth-child(1){animation-delay:.05s}.a:nth-child(2){animation-delay:.1s}.a:nth-child(3){animation-delay:.15s}.a:nth-child(4){animation-delay:.2s}.a:nth-child(5){animation-delay:.25s}.a:nth-child(6){animation-delay:.3s}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
    h1{font-size:clamp(46px,5vw,76px);line-height:1.08;letter-spacing:-.045em;margin-bottom:22px}h2{font-size:clamp(34px,3.4vw,54px);line-height:1.12;letter-spacing:-.035em;margin-bottom:18px}h3{font-size:20px;margin-bottom:12px}p{font-size:clamp(18px,1.7vw,26px);line-height:1.55;color:var(--muted)}
    .accent{color:var(--accent)}.tag{display:inline-block;margin-bottom:20px;border-radius:999px;background:var(--accent);padding:6px 13px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
    @media(max-width:760px){.slide{grid-template-columns:1fr;padding:72px 28px 80px;gap:24px}.slide.full{grid-template-columns:1fr}h1{font-size:42px}h2{font-size:34px}.hint{display:none}}
    @media print{.progress,.counter,.hint,.fullscreen-btn{display:none!important}.slide{page-break-after:always;position:relative!important;opacity:1!important;display:grid!important;width:100vw;height:100vh}.slide.full{display:flex!important}@page{size:landscape;margin:0}}
  </style>
</head>
<body>
  <div class="progress" id="progress"></div><div class="counter" id="counter"></div><div class="hint">← → 이동 · F 전체화면 · S 발표자 노트</div><button class="fullscreen-btn" onclick="toggleFullscreen()">전체화면</button>
  <main>
    <section class="slide full active" data-slide="1" data-minutes="1"
      data-notes="[1분] Solution PE팀 Staff에게 오늘 만들 결과를 먼저 보여줍니다. 발표자는 원용석입니다.">
      <div>
        <span class="tag">Solution PE팀 Staff · 실무 워크숍</span>
        <h1>Claude Code로<br><span class="accent">업무 포트폴리오 만들기</span></h1>
        <p>빈 저장소에서 공개 URL까지 · 발표 원용석</p>
      </div>
    </section>
  </main>
  <script>
    const slides = [...document.querySelectorAll('.slide')];
    let current = 0;

    function goTo(index) {
      if (index < 0 || index >= slides.length) return;
      slides[current].classList.remove('active');
      slides[index].classList.add('active');
      current = index;
      updateProgress();
      updateCounter();
      updateNotes();
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goTo(current + 1); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); goTo(current - 1); }
      if (e.key.toLowerCase() === 'f') toggleFullscreen();
      if (e.key.toLowerCase() === 's') toggleNotes();
    });

    let touchStartX = 0;
    document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
    document.addEventListener('touchend', (e) => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) diff > 0 ? goTo(current + 1) : goTo(current - 1);
    });

    function updateProgress() {
      document.getElementById('progress').style.width =
        (current / (slides.length - 1) * 100) + '%';
    }

    function updateCounter() {
      document.getElementById('counter').textContent =
        (current + 1) + ' / ' + slides.length;
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }

    let notesWindow = null;

    function toggleNotes() {
      if (notesWindow && !notesWindow.closed) {
        notesWindow.close();
        notesWindow = null;
        return;
      }
      notesWindow = window.open('', 'SpeakerNotes', 'width=520,height=420,top=80,left=80');
      notesWindow.document.write(`<!DOCTYPE html>
<html><head><style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif;
         background: #1a1a1a; color: #e0e0e0; padding: 24px; }
  .slide-num { font-size: 12px; color: #888; margin-bottom: 12px; font-family: monospace; }
  .label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
           color: #666; margin-bottom: 8px; }
  .notes { font-size: 16px; line-height: 1.8; color: #ccc; }
</style></head><body>
  <div class="slide-num" id="sn"></div>
  <div class="label">Speaker Notes</div>
  <div class="notes" id="nt"></div>
</body></html>`);
      notesWindow.document.close();
      updateNotes();
    }

    function updateNotes() {
      if (!notesWindow || notesWindow.closed) return;
      try {
        const note = slides[current].dataset.notes || '(No notes)';
        notesWindow.document.getElementById('nt').textContent = note;
        notesWindow.document.getElementById('sn').textContent =
          'Slide ' + (current + 1) + ' / ' + slides.length;
      } catch(e) {}
    }

    updateProgress();
    updateCounter();
  </script>
</body>
</html>
