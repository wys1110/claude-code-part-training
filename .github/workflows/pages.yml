name: Deploy presentation to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate presentation
        run: |
          python - <<'PY'
          import pathlib, re
          text = ''.join(pathlib.Path(f'slides-{i}.js').read_text(encoding='utf-8') for i in range(1, 5))
          ids = re.findall(r'\{id:(\d+),', text)
          minutes = [float(v) for v in re.findall(r'\{id:\d+,section:[^\n]+?minutes:([0-9.]+),', text)]
          assert ids == [str(i) for i in range(1, 30)], f'slide ids: {ids}'
          assert len(minutes) == 29, f'timing count: {len(minutes)}'
          assert all(value > 0 for value in minutes), f'invalid timing values: {minutes}'
          for required in ('index.html','styles.css','slides-1.js','slides-2.js','slides-3.js','slides-4.js','app.js'):
              assert pathlib.Path(required).is_file(), f'missing {required}'
          print(f'Validated root deck 29 slides / {sum(minutes):g} minutes of timing metadata')

          workshop_path = pathlib.Path('drafts/solution-pe-portfolio-workshop/index.html')
          workshop = workshop_path.read_text(encoding='utf-8')
          workshop_slides = re.findall(
              r'<section\s+class="[^"]*\bslide\b[^"]*"\s+data-slide="(\d+)"\s+data-minutes="([0-9.]+)"',
              workshop,
          )
          workshop_ids = [slide_id for slide_id, _ in workshop_slides]
          workshop_minutes = [float(value) for _, value in workshop_slides]
          assert workshop_ids == [str(i) for i in range(1, 74)], f'workshop slide ids: {workshop_ids}'
          assert len(workshop_minutes) == 73, f'workshop timing count: {len(workshop_minutes)}'
          assert all(value > 0 for value in workshop_minutes), f'invalid workshop timing values: {workshop_minutes}'
          print(f'Validated workshop source 73 slides / {sum(workshop_minutes):g} minutes of timing metadata')
          PY

          python scripts/build_workshop.py drafts/solution-pe-portfolio-workshop/index.html /tmp/workshop.html
          python scripts/enrich_skill_pages.py /tmp/workshop.html /tmp/workshop.html
          python - <<'PY'
          import json, pathlib, re
          built = pathlib.Path('/tmp/workshop.html').read_text(encoding='utf-8')
          built_slides = re.findall(
              r'<section\s+class="[^"]*\bslide\b[^"]*"\s+data-slide="(\d+)"\s+data-minutes="([0-9.]+)"',
              built,
          )
          built_ids = [slide_id for slide_id, _ in built_slides]
          built_minutes = [float(value) for _, value in built_slides]
          assert built_ids == [str(i) for i in range(1, 80)], f'built slide ids: {built_ids}'
          assert len(built_minutes) == 79, f'built timing count: {len(built_minutes)}'
          assert all(value > 0 for value in built_minutes), f'invalid built timing values: {built_minutes}'
          assert '<h2>CONTENTS</h2>' in built
          assert '13–27' in built and '78–79' in built
          for title in (
              'brainstorming은 네 질문으로 요구사항을 고정한다',
              'writing-plans는 네 칸으로 실행 가능성을 확인한다',
              'frontend-design은 30초 읽기 순서를 설계한다',
              'systematic-debugging은 네 단계로 원인을 좁힌다',
              'verification-before-completion은 네 증거를 한 번에 묶는다',
          ):
              assert f'<h2>{title}</h2>' in built, title
          assert built.count('skill-rich-slide') >= 10
          assert built.count('COPYABLE PROMPT') == 5
          assert built.count('EXPECTED RESPONSE') == 5
          assert built.count('FAILURE PATTERNS') == 5
          assert built.count('왜 필요한가') == 5
          assert built.count('실제 업무 상황') == 5
          assert built.count('좋은 요청 예시') == 5
          assert built.count('사람이 결정할 것') == 5
          skill_slides = re.findall(
              r'<section\s+class="[^"]*\bskill-rich-slide\b[^"]*"\s+data-slide="(\d+)"\s+data-minutes="([0-9.]+)"',
              built,
          )
          assert len(skill_slides) == 10, f'detailed skill timing count: {skill_slides}'
          assert all(float(value) >= 3 for _, value in skill_slides), f'detailed skill timings: {skill_slides}'
          notes_match = re.search(
              r'<script type="application/json" id="speaker-notes-data">(.*?)</script>',
              built,
              re.S,
          )
          assert notes_match, 'speaker notes missing'
          notes = json.loads(notes_match.group(1))
          assert [note['slide'] for note in notes] == list(range(1, 80))
          assert notes[1]['title'] == 'CONTENTS'
          for page in range(16, 26):
              assert notes[page - 1]['body'].startswith('[약 3분]'), (page, notes[page - 1]['body'][:20])
          print(f'Validated explanation-rich public workshop 79 slides / {sum(built_minutes):g} minutes of flexible timing')
          PY

          python -m py_compile scripts/build_workshop.py scripts/enrich_skill_pages.py
          node --check slides-1.js
          node --check slides-2.js
          node --check slides-3.js
          node --check slides-4.js
          node --check app.js
          node --test

      - name: Build minimal Pages artifact
        run: |
          mkdir -p _site/solution-pe-portfolio-workshop
          python scripts/build_workshop.py drafts/solution-pe-portfolio-workshop/index.html _site/index.html
          python scripts/enrich_skill_pages.py _site/index.html _site/index.html
          cp _site/index.html _site/solution-pe-portfolio-workshop/index.html
          cmp _site/index.html _site/solution-pe-portfolio-workshop/index.html
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static presentation
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
