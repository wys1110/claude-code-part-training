name: Validate training site

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Validate slide count and timing
        run: |
          python - <<'PY'
          import pathlib, re

          base = pathlib.Path('slides/deck.ts').read_text(encoding='utf-8')
          ids = re.findall(r'\bid:\s*(\d+)', base)
          minutes = [float(value) for value in re.findall(r'\bminutes:\s*([0-9.]+)', base)]
          assert len(ids) == 44, f'expected 44 base slides, found {len(ids)}'
          assert len(minutes) == 44, f'expected 44 base timing values, found {len(minutes)}'
          assert abs(sum(minutes) - 120) < 0.001, f'expected 120 minutes, found {sum(minutes)}'
          assert ids == [str(i) for i in range(1, 45)], 'slide ids must be sequential 1..44'

          pages = pathlib.Path('slides/pages-deck.ts').read_text(encoding='utf-8')
          replacement_ids = re.findall(r'^\s{2}(1[0-6]):\s*\{', pages, flags=re.MULTILINE)
          replacement_minutes = [float(value) for value in re.findall(r'id:\s*1[0-6].*?minutes:\s*([0-9.]+)', pages)]
          assert replacement_ids == [str(i) for i in range(10, 17)], f'expected replacements 10..16, found {replacement_ids}'
          assert len(replacement_minutes) == 7, f'expected 7 replacement timings, found {len(replacement_minutes)}'
          assert abs(sum(replacement_minutes) - 15) < 0.001, f'GitHub section must remain 15 minutes, found {sum(replacement_minutes)}'
          assert 'baseSlides.map' in pages, 'presentation deck must preserve the 44-slide base deck'
          assert 'participantPrompt' in pages, 'GitHub section must include the copyable participant prompt'
          assert 'gh api' in pages, 'GitHub section must include Pages API automation'
          assert "source[branch]=main" in pages and "source[path]=/" in pages

          index = pathlib.Path('slides/index.md').read_text(encoding='utf-8')
          assert "from './pages-deck'" in index, 'slides/index.md must use pages-deck'

          print(f'Validated 44 slides / 120 minutes; automated Pages replacements 10-16 / {sum(replacement_minutes):g} minutes')
          PY

      - name: Check required presentation files
        run: |
          test -f slides/index.md
          test -f slides/deck.ts
          test -f slides/pages-deck.ts
          test -f .vitepress/theme/SlideDeck.vue
          test -f .vitepress/theme/SlideFrame.vue
          test -f instructor/slide-speaker-notes.md
          test -f instructor/live-demo-script.md
          test -f instructor/lab-answer-key.md
          test -f instructor/github-pages-demo-script.md
          test -f guide/04-latest-feature-map.md
          test -f guide/04-github-repository-pages.md

      - name: Check repository URL to Pages guidance
        run: |
          grep -q "base: '/claude-code-part-training/'" .vitepress/config.mts
          grep -q "/guide/04-github-repository-pages" .vitepress/config.mts
          grep -q "/guide/04-github-repository-pages" slides/pages-deck.ts
          grep -q "Repository URL" guide/04-github-repository-pages.md
          grep -q "gh api" guide/04-github-repository-pages.md
          grep -q "source\[branch\]=main" guide/04-github-repository-pages.md
          grep -q "source\[path\]=/" guide/04-github-repository-pages.md
          grep -q "발표자료 전용" guide/04-github-repository-pages.md

      - name: Build VitePress site
        run: npm run docs:build
