<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111318">
  <meta name="description" content="Claude Code로 정적 웹을 만들고 GitHub Pages로 배포하는 2시간 실무 워크숍">
  <title>Claude Code GitHub Pages 실무 워크숍</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="app" aria-live="polite">
    <section id="slide" class="slide" aria-label="발표 슬라이드"></section>
    <div id="progress" class="progress"><span></span></div>
    <header class="topbar">
      <span id="section-name">Claude Code Training</span>
      <span id="clock"></span>
    </header>
    <footer class="controls">
      <button type="button" data-action="prev" aria-label="이전 슬라이드">←</button>
      <span id="counter">1 / 29</span>
      <button type="button" data-action="next" aria-label="다음 슬라이드">→</button>
      <button type="button" data-action="overview">개요</button>
      <button type="button" data-action="notes">노트</button>
      <button type="button" data-action="fullscreen">전체화면</button>
      <button type="button" data-action="print">PDF</button>
    </footer>
  </main>

  <aside id="notes-panel" class="panel" hidden>
    <div class="panel-head"><strong>발표자 노트</strong><button data-action="close">×</button></div>
    <div id="notes-content"></div>
  </aside>

  <section id="overview" class="overlay" hidden>
    <div class="overlay-head"><strong>전체 슬라이드</strong><button data-action="close">×</button></div>
    <div id="overview-grid" class="overview-grid"></div>
  </section>

  <section id="help" class="overlay help" hidden>
    <div class="overlay-head"><strong>단축키</strong><button data-action="close">×</button></div>
    <div class="shortcut-grid">
      <span>← / PageUp</span><b>이전</b><span>→ / Space / PageDown</span><b>다음</b>
      <span>Home / End</span><b>처음 / 마지막</b><span>O</span><b>개요</b>
      <span>N</span><b>노트</b><span>F</span><b>전체화면</b><span>P</span><b>인쇄·PDF</b>
    </div>
  </section>

  <div id="toast" class="toast" role="status"></div>
  <div id="print-deck" class="print-deck" aria-hidden="true"></div>
  <script src="slides-1.js"></script>
  <script src="slides-2.js"></script>
  <script src="slides-3.js"></script>
  <script src="slides-4.js"></script>
  <script src="app.js"></script>
</body>
</html>
